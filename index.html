<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RiderHub — Driver</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            ink: '#0a0e0c',
            panel: '#13181550',
            brand: '#1fd65f',
            brandDim: '#15b04e',
          },
          keyframes: {
            slideUp: { '0%': { transform: 'translateY(100%)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
            popIn: { '0%': { transform: 'scale(0.92)', opacity: '0' }, '100%': { transform: 'scale(1)', opacity: '1' } },
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            pulseRing: { '0%,100%': { opacity: '1' }, '50%': { opacity: '0.45' } },
            toastIn: { '0%': { transform: 'translateY(20px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
          },
          animation: {
            slideUp: 'slideUp 0.32s cubic-bezier(0.16,1,0.3,1)',
            popIn: 'popIn 0.25s cubic-bezier(0.16,1,0.3,1)',
            fadeIn: 'fadeIn 0.25s ease-out',
            pulseRing: 'pulseRing 1.4s ease-in-out infinite',
            toastIn: 'toastIn 0.3s cubic-bezier(0.16,1,0.3,1)',
          },
        },
      },
    };
  </script>
  <style>
    html, body { background: #050706; margin: 0; }
    * { -webkit-tap-highlight-color: transparent; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .phone-shadow { box-shadow: 0 40px 120px -20px rgba(31,214,95,0.18), 0 30px 80px -30px rgba(0,0,0,0.9); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect } = React;

    /* ---------- Tiny inline icons (no external deps) ---------- */
    const Icon = ({ d, className = "w-5 h-5", stroke = 2, fill = "none" }) => (
      <svg className={className} viewBox="0 0 24 24" fill={fill} stroke="currentColor"
           strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round">{d}</svg>
    );
    const HomeIcon = (p) => <Icon {...p} d={<><path d="M3 11l9-8 9 8" /><path d="M5 10v10a1 1 0 001 1h12a1 1 0 001-1V10" /></>} />;
    const TrophyIcon = (p) => <Icon {...p} d={<><path d="M8 21h8M12 17v4M7 4h10v5a5 5 0 01-10 0V4z" /><path d="M17 5h3v2a3 3 0 01-3 3M7 5H4v2a3 3 0 003 3" /></>} />;
    const BoltIcon = (p) => <Icon {...p} fill="currentColor" stroke="none" d={<path d="M13 2L3 14h7l-1 8 10-12h-7l1-8z" />} />;
    const ClockIcon = (p) => <Icon {...p} d={<><circle cx="12" cy="12" r="9" /><path d="M12 7v5l3 2" /></>} />;
    const PinIcon = (p) => <Icon {...p} d={<><path d="M12 21s-7-5.2-7-11a7 7 0 0114 0c0 5.8-7 11-7 11z" /><circle cx="12" cy="10" r="2.5" /></>} />;
    const StoreIcon = (p) => <Icon {...p} d={<><path d="M3 9l1.5-5h15L21 9M4 9v10a1 1 0 001 1h14a1 1 0 001-1V9M4 9h16" /></>} />;
    const RouteIcon = (p) => <Icon {...p} d={<><circle cx="6" cy="6" r="2.5" /><circle cx="18" cy="18" r="2.5" /><path d="M8.5 6H15a3 3 0 010 6H9a3 3 0 000 6h6.5" /></>} />;
    const WarnIcon = (p) => <Icon {...p} d={<><path d="M12 9v4M12 17h.01" /><path d="M10.3 3.6L1.8 18a2 2 0 001.7 3h17a2 2 0 001.7-3L13.7 3.6a2 2 0 00-3.4 0z" /></>} />;
    const CheckCircle = (p) => <Icon {...p} d={<><circle cx="12" cy="12" r="9" /><path d="M8.5 12.5l2.5 2.5 4.5-5" /></>} />;
    const XIcon = (p) => <Icon {...p} d={<><path d="M18 6L6 18M6 6l12 12" /></>} />;
    const TrendDown = (p) => <Icon {...p} d={<><path d="M22 17l-8.5-8.5-4 4L2 5" /><path d="M16 17h6v-6" /></>} />;
    const StarIcon = (p) => <Icon {...p} fill="currentColor" stroke="none" d={<path d="M12 2l2.9 6.3 6.9.7-5.1 4.6 1.4 6.8L12 17.6 5.9 20.4l1.4-6.8L2.2 9l6.9-.7z" />} />;

    /* ---------- Phone status bar ---------- */
    function StatusBar() {
      const [time, setTime] = useState(() => {
        const d = new Date();
        return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
      });
      useEffect(() => {
        const t = setInterval(() => {
          const d = new Date();
          setTime(d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0'));
        }, 10000);
        return () => clearInterval(t);
      }, []);
      return (
        <div className="flex items-center justify-between px-6 pt-3 pb-1 text-white text-[13px] font-semibold select-none">
          <span className="tracking-wide">{time}</span>
          <div className="flex items-center gap-1.5">
            {/* signal */}
            <svg className="w-4 h-3.5" viewBox="0 0 18 14" fill="currentColor"><rect x="0" y="9" width="3" height="5" rx="1"/><rect x="5" y="6" width="3" height="8" rx="1"/><rect x="10" y="3" width="3" height="11" rx="1"/><rect x="15" y="0" width="3" height="14" rx="1"/></svg>
            {/* wifi */}
            <svg className="w-4 h-3.5" viewBox="0 0 18 14" fill="currentColor"><path d="M9 13.5l2.2-2.7a3 3 0 00-4.4 0L9 13.5z"/><path d="M3.4 6.8a8 8 0 0111.2 0l-1.5 1.6a5.8 5.8 0 00-8.2 0L3.4 6.8z" opacity=".95"/><path d="M.8 4.2a11.7 11.7 0 0116.4 0l-1.5 1.6a9.5 9.5 0 00-13.4 0L.8 4.2z" opacity=".9"/></svg>
            {/* battery */}
            <div className="flex items-center gap-0.5">
              <div className="w-6 h-3 rounded-[3px] border border-white/80 p-[1.5px]"><div className="h-full bg-white rounded-[1px]" style={{width:'78%'}}></div></div>
              <div className="w-[2px] h-1.5 bg-white/80 rounded-full"></div>
            </div>
          </div>
        </div>
      );
    }

    /* ---------- Brand logo mark (fictional) ---------- */
    function Logo() {
      return (
        <div className="flex items-center gap-2.5">
          <div className="relative w-9 h-9 rounded-xl bg-gradient-to-br from-brand to-brandDim flex items-center justify-center shadow-lg shadow-brand/30">
            <BoltIcon className="w-5 h-5 text-ink" />
          </div>
          <div className="leading-none">
            <div className="text-white font-extrabold text-lg tracking-tight">Rider<span className="text-brand">Hub</span></div>
            <div className="text-[10px] text-white/40 font-medium tracking-wider uppercase mt-0.5">Driver</div>
          </div>
        </div>
      );
    }

    /* ---------- Online status pill ---------- */
    function OnlinePill() {
      return (
        <div className="flex items-center gap-2 bg-brand/10 border border-brand/30 rounded-full pl-2.5 pr-3.5 py-1.5">
          <span className="relative flex h-2.5 w-2.5">
            <span className="absolute inline-flex h-full w-full rounded-full bg-brand animate-pulseRing"></span>
            <span className="relative inline-flex rounded-full h-2.5 w-2.5 bg-brand"></span>
          </span>
          <span className="text-brand text-[13px] font-bold tracking-wide">Online</span>
        </div>
      );
    }

    /* ---------- Section card wrapper ---------- */
    const Card = ({ children, className = "" }) => (
      <div className={"rounded-2xl bg-white/[0.04] border border-white/[0.07] " + className}>{children}</div>
    );

    const DetailRow = ({ icon, label, value, valueClass = "text-white" }) => (
      <div className="flex items-center justify-between py-2">
        <div className="flex items-center gap-2.5 text-white/55">
          {icon}
          <span className="text-[13px] font-medium">{label}</span>
        </div>
        <span className={"text-[14px] font-semibold " + valueClass}>{value}</span>
      </div>
    );

    /* ================= DASHBOARD ================= */
    function Dashboard({ pushToast }) {
      const [orderState, setOrderState] = useState('open'); // open | accepted | rejected
      const [showReject, setShowReject] = useState(false);
      const [showComplete, setShowComplete] = useState(false);
      const [currentDone, setCurrentDone] = useState(false);

      // current-order countdown for stress effect
      const [secs, setSecs] = useState(4 * 60);
      useEffect(() => {
        if (currentDone) return;
        const t = setInterval(() => setSecs((s) => (s > 0 ? s - 1 : 0)), 1000);
        return () => clearInterval(t);
      }, [currentDone]);
      const mm = Math.floor(secs / 60), ss = (secs % 60).toString().padStart(2, '0');
      const urgent = secs <= 120;

      return (
        <div className="px-4 pb-4 space-y-3.5">
          {/* New Order Request */}
          {orderState === 'open' && (
            <Card className="overflow-hidden animate-fadeIn">
              <div className="flex items-center justify-between px-4 pt-3.5 pb-2.5 bg-brand/[0.07] border-b border-white/[0.06]">
                <div className="flex items-center gap-2">
                  <span className="relative flex h-2 w-2">
                    <span className="absolute inline-flex h-full w-full rounded-full bg-brand animate-pulseRing"></span>
                    <span className="relative inline-flex rounded-full h-2 w-2 bg-brand"></span>
                  </span>
                  <span className="text-white font-bold text-[15px]">New Order Request</span>
                </div>
                <span className="text-[11px] font-semibold text-brand bg-brand/10 px-2 py-0.5 rounded-full">Auto-expires 0:18</span>
              </div>
              <div className="px-4 py-3">
                <div className="flex items-baseline justify-between mb-1">
                  <div>
                    <div className="text-white font-extrabold text-[17px] leading-tight">Kowloon Noodle House</div>
                    <div className="text-white/45 text-[13px] mt-0.5 flex items-center gap-1.5"><PinIcon className="w-3.5 h-3.5" />Drop-off · Sai Ying Pun</div>
                  </div>
                  <div className="text-right">
                    <div className="text-brand font-extrabold text-2xl leading-none">HK$31</div>
                    <div className="text-white/40 text-[11px] mt-1">est. pay</div>
                  </div>
                </div>
                <div className="grid grid-cols-2 gap-2 mt-3">
                  <div className="rounded-xl bg-white/[0.04] px-3 py-2 flex items-center gap-2">
                    <RouteIcon className="w-4 h-4 text-brand" />
                    <div><div className="text-white font-bold text-[14px]">2.4 km</div><div className="text-white/40 text-[10px]">distance</div></div>
                  </div>
                  <div className="rounded-xl bg-white/[0.04] px-3 py-2 flex items-center gap-2">
                    <ClockIcon className="w-4 h-4 text-brand" />
                    <div><div className="text-white font-bold text-[14px]">14 min</div><div className="text-white/40 text-[10px]">est. time</div></div>
                  </div>
                </div>
                <div className="flex gap-2.5 mt-3.5">
                  <button onClick={() => setShowReject(true)}
                    className="flex-1 py-3 rounded-xl bg-white/[0.06] text-white/70 font-bold text-[15px] active:scale-[0.97] transition-transform border border-white/[0.08]">
                    Reject
                  </button>
                  <button onClick={() => { setOrderState('accepted'); pushToast('Order accepted — pickup added to your route'); }}
                    className="flex-[1.6] py-3 rounded-xl bg-brand text-ink font-extrabold text-[15px] active:scale-[0.97] transition-transform shadow-lg shadow-brand/25">
                    Accept
                  </button>
                </div>
              </div>
            </Card>
          )}
          {orderState === 'accepted' && (
            <Card className="px-4 py-3 flex items-center gap-3 animate-fadeIn">
              <CheckCircle className="w-6 h-6 text-brand" />
              <div className="text-white/80 text-[14px] font-medium">Order accepted. <span className="text-white/40">Added to your active route.</span></div>
            </Card>
          )}
          {orderState === 'rejected' && (
            <Card className="px-4 py-3 flex items-center gap-3 animate-fadeIn">
              <XIcon className="w-5 h-5 text-white/40" />
              <div className="text-white/55 text-[14px] font-medium">Order rejected. <span className="text-amber-400/80">Ranking impact applied.</span></div>
            </Card>
          )}

          {/* Earnings */}
          <Card className="overflow-hidden relative">
            <div className="absolute inset-0 bg-gradient-to-br from-brand/[0.10] via-transparent to-transparent pointer-events-none"></div>
            <div className="px-5 pt-4 pb-4 relative">
              <div className="flex items-center justify-between">
                <span className="text-white/55 text-[13px] font-semibold uppercase tracking-wide">Today's Earnings</span>
                <span className="text-[11px] font-semibold text-brand bg-brand/10 px-2 py-1 rounded-full flex items-center gap-1"><BoltIcon className="w-3 h-3"/>+18% vs avg</span>
              </div>
              <div className="flex items-end gap-1 mt-1">
                <span className="text-white/60 font-bold text-2xl mb-1.5">HK$</span>
                <span className="text-white font-black text-6xl leading-none tracking-tight">287</span>
              </div>
              <div className="grid grid-cols-2 gap-3 mt-4">
                <div className="rounded-xl bg-black/20 px-3.5 py-2.5">
                  <div className="text-white/45 text-[11px] font-medium flex items-center gap-1.5"><ClockIcon className="w-3.5 h-3.5"/>Active today</div>
                  <div className="text-white font-bold text-[16px] mt-1">9.5 hours</div>
                </div>
                <div className="rounded-xl bg-black/20 px-3.5 py-2.5">
                  <div className="text-white/45 text-[11px] font-medium flex items-center gap-1.5"><CheckCircle className="w-3.5 h-3.5"/>Completed</div>
                  <div className="text-white font-bold text-[16px] mt-1">12 deliveries</div>
                </div>
              </div>
            </div>
          </Card>

          {/* Current Order */}
          <Card className="overflow-hidden">
            <div className="flex items-center justify-between px-4 pt-3.5 pb-2.5 border-b border-white/[0.06]">
              <span className="text-white font-bold text-[15px]">Current Order</span>
              {!currentDone
                ? <span className="text-[11px] font-bold text-brand bg-brand/10 px-2.5 py-1 rounded-full">Delivering now</span>
                : <span className="text-[11px] font-bold text-white/40 bg-white/5 px-2.5 py-1 rounded-full">Completed</span>}
            </div>
            <div className="px-4 py-3">
              {/* route line */}
              <div className="flex gap-3">
                <div className="flex flex-col items-center pt-1">
                  <div className="w-2.5 h-2.5 rounded-full bg-brand"></div>
                  <div className="w-0.5 flex-1 bg-gradient-to-b from-brand/60 to-white/15 my-1"></div>
                  <div className="w-2.5 h-2.5 rounded-full border-2 border-white/40"></div>
                </div>
                <div className="flex-1 space-y-3">
                  <div>
                    <div className="text-white/40 text-[11px] font-medium">Pickup</div>
                    <div className="text-white font-semibold text-[14px] flex items-center gap-1.5"><StoreIcon className="w-4 h-4 text-white/40"/>Central Kitchen</div>
                  </div>
                  <div>
                    <div className="text-white/40 text-[11px] font-medium">Drop-off</div>
                    <div className="text-white font-semibold text-[14px] flex items-center gap-1.5"><PinIcon className="w-4 h-4 text-white/40"/>Mid-Levels</div>
                  </div>
                </div>
              </div>

              {/* urgent timer */}
              {!currentDone && (
                <div className={"mt-3 rounded-xl px-3.5 py-2.5 flex items-center justify-between border " +
                  (urgent ? "bg-red-500/10 border-red-500/40" : "bg-amber-500/10 border-amber-500/35")}>
                  <div className="flex items-center gap-2">
                    <WarnIcon className={"w-5 h-5 " + (urgent ? "text-red-400 animate-pulseRing" : "text-amber-400")} />
                    <span className={"text-[13px] font-bold " + (urgent ? "text-red-300" : "text-amber-300")}>Deliver within 4 minutes</span>
                  </div>
                  <span className={"font-black text-[18px] tabular-nums " + (urgent ? "text-red-400" : "text-amber-400")}>{mm}:{ss}</span>
                </div>
              )}

              <button
                disabled={currentDone}
                onClick={() => setShowComplete(true)}
                className={"w-full mt-3 py-3 rounded-xl font-extrabold text-[15px] active:scale-[0.98] transition-transform " +
                  (currentDone ? "bg-white/[0.05] text-white/30" : "bg-brand text-ink shadow-lg shadow-brand/25")}>
                {currentDone ? "Order completed ✓" : "Completed"}
              </button>
            </div>
          </Card>

          <div className="text-center text-white/25 text-[11px] pt-1 pb-2">RiderHub for Drivers · v3.1.0 · This is a fictional demo app</div>

          {/* ===== Reject modal ===== */}
          {showReject && (
            <div className="fixed inset-0 z-50 flex items-end justify-center" onClick={() => setShowReject(false)}>
              <div className="absolute inset-0 bg-black/70 backdrop-blur-sm animate-fadeIn"></div>
              <div onClick={(e)=>e.stopPropagation()} className="relative w-full max-w-[420px] mx-auto bg-[#15110f] border-t border-x border-red-500/30 rounded-t-3xl p-5 pb-7 animate-slideUp">
                <div className="w-10 h-1 bg-white/15 rounded-full mx-auto mb-4"></div>
                <div className="flex flex-col items-center text-center">
                  <div className="w-14 h-14 rounded-2xl bg-red-500/15 border border-red-500/30 flex items-center justify-center mb-3">
                    <WarnIcon className="w-7 h-7 text-red-400" />
                  </div>
                  <div className="text-white font-extrabold text-xl">Are you sure?</div>
                  <div className="text-red-300/90 font-bold text-[15px] mt-2 flex items-center gap-1.5">
                    <TrendDown className="w-4 h-4" /> You will lose 16 ranking places.
                  </div>
                  <div className="text-white/45 text-[13px] mt-2 leading-relaxed">
                    Rejecting orders lowers your acceptance rate and may reduce future order priority in your zone.
                  </div>
                </div>
                <div className="flex gap-2.5 mt-5">
                  <button onClick={() => { setShowReject(false); setOrderState('rejected'); pushToast('Order rejected.'); }}
                    className="flex-1 py-3 rounded-xl bg-red-500/15 text-red-300 font-bold text-[15px] border border-red-500/30 active:scale-[0.97] transition-transform">
                    Reject Anyway
                  </button>
                  <button onClick={() => setShowReject(false)}
                    className="flex-[1.4] py-3 rounded-xl bg-brand text-ink font-extrabold text-[15px] active:scale-[0.97] transition-transform shadow-lg shadow-brand/25">
                    Nevermind
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* ===== Completed modal ===== */}
          {showComplete && (
            <div className="fixed inset-0 z-50 flex items-center justify-center px-6" onClick={() => { setShowComplete(false); setCurrentDone(true); }}>
              <div className="absolute inset-0 bg-black/75 backdrop-blur-sm animate-fadeIn"></div>
              <div onClick={(e)=>e.stopPropagation()} className="relative w-full max-w-[340px] bg-gradient-to-b from-[#0e1a12] to-[#0b0f0c] border border-brand/30 rounded-3xl p-6 text-center animate-popIn shadow-2xl shadow-brand/20">
                <div className="w-16 h-16 rounded-full bg-brand/15 border border-brand/40 flex items-center justify-center mx-auto mb-4">
                  <CheckCircle className="w-9 h-9 text-brand" stroke={2.2} />
                </div>
                <div className="text-white font-extrabold text-xl">Order Completed</div>
                <div className="text-white/50 text-[13px] mt-1">You earned from this order</div>
                <div className="flex items-end justify-center gap-1 mt-3">
                  <span className="text-white/60 font-bold text-xl mb-1">HK$</span>
                  <span className="text-brand font-black text-5xl leading-none">31</span>
                </div>
                <div className="mt-3 text-[12px] text-brand/80 font-semibold bg-brand/10 rounded-full px-3 py-1.5 inline-flex items-center gap-1.5">
                  <BoltIcon className="w-3.5 h-3.5" /> Added to today's earnings
                </div>
                <button onClick={() => { setShowComplete(false); setCurrentDone(true); pushToast('Nice work! Keep your streak going.'); }}
                  className="w-full mt-5 py-3 rounded-xl bg-brand text-ink font-extrabold text-[15px] active:scale-[0.98] transition-transform">
                  Back to Dashboard
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ================= RANKINGS ================= */
    function Rankings() {
      const rank = 3755, total = 5890;
      const pct = (1 - rank / total) * 100; // higher = better; ~36%
      const [fill, setFill] = useState(0);
      useEffect(() => { const t = setTimeout(() => setFill(pct), 150); return () => clearTimeout(t); }, []);

      const Stat = ({ label, value, sub, tone }) => (
        <div className="rounded-2xl bg-white/[0.04] border border-white/[0.07] px-3.5 py-3 text-center">
          <div className={"font-black text-2xl " + tone}>{value}</div>
          <div className="text-white/55 text-[12px] font-semibold mt-0.5">{label}</div>
          {sub && <div className="text-white/30 text-[10px] mt-0.5">{sub}</div>}
        </div>
      );

      return (
        <div className="px-4 pb-4 space-y-3.5">
          {/* Hero rank card */}
          <Card className="overflow-hidden relative">
            <div className="absolute inset-0 bg-gradient-to-br from-amber-500/[0.07] via-transparent to-transparent pointer-events-none"></div>
            <div className="px-5 pt-5 pb-5 relative">
              <div className="flex items-center gap-2 text-white/55 text-[13px] font-semibold uppercase tracking-wide">
                <TrophyIcon className="w-4 h-4 text-amber-400" /> Driver Ranking
              </div>
              <div className="flex items-end gap-2 mt-2">
                <span className="text-white font-black text-5xl leading-none">#3755</span>
              </div>
              <div className="text-white/50 text-[14px] mt-2 font-medium">out of <span className="text-white font-bold">5,890</span> drivers in Hong Kong Island</div>

              {/* ranking meter */}
              <div className="mt-5">
                <div className="flex justify-between text-[10px] font-semibold text-white/35 mb-1.5">
                  <span>Bottom</span><span>Lower-mid</span><span>Top</span>
                </div>
                <div className="relative h-3 rounded-full bg-white/[0.06] overflow-hidden">
                  <div className="absolute inset-0 bg-gradient-to-r from-red-500/30 via-amber-500/30 to-brand/30"></div>
                  <div className="h-full rounded-full bg-gradient-to-r from-amber-400 to-amber-500 transition-all duration-1000 ease-out relative"
                       style={{ width: fill + '%' }}>
                  </div>
                  <div className="absolute top-1/2 -translate-y-1/2 w-4 h-4 rounded-full bg-white border-2 border-amber-500 shadow transition-all duration-1000 ease-out"
                       style={{ left: 'calc(' + fill + '% - 8px)' }}></div>
                </div>
                <div className="text-amber-300/90 text-[12px] font-semibold mt-2 text-center">You're in the lower-middle range</div>
              </div>
            </div>
          </Card>

          {/* Pressure callout */}
          <Card className="px-4 py-3.5 border-amber-500/20 bg-amber-500/[0.05]">
            <div className="flex items-start gap-3">
              <BoltIcon className="w-5 h-5 text-amber-400 mt-0.5 shrink-0" />
              <div className="space-y-1.5">
                <div className="text-white font-bold text-[14px]">Accept more orders to improve your ranking.</div>
                <div className="text-white/50 text-[13px] flex items-center gap-1.5"><TrendDown className="w-3.5 h-3.5 text-red-400" /> Rejecting orders may lower your ranking.</div>
              </div>
            </div>
          </Card>

          {/* Stats */}
          <div className="grid grid-cols-3 gap-2.5">
            <Stat label="Acceptance" value="78%" sub="last 30 days" tone="text-amber-400" />
            <Stat label="On-time" value="91%" sub="delivery rate" tone="text-brand" />
            <Stat label="Tier" value="Standard" sub="" tone="text-white text-[18px] flex items-center justify-center h-8" />
          </div>

          {/* Next tier progress */}
          <Card className="px-4 py-4">
            <div className="flex items-center justify-between mb-2.5">
              <span className="text-white font-bold text-[14px]">Next tier: <span className="text-brand">Gold</span></span>
              <span className="text-white/45 text-[12px] font-semibold">85% acceptance needed</span>
            </div>
            <div className="h-2.5 rounded-full bg-white/[0.06] overflow-hidden">
              <div className="h-full rounded-full bg-gradient-to-r from-brandDim to-brand transition-all duration-1000" style={{ width: fill ? '78%' : '0%' }}></div>
            </div>
            <div className="text-white/40 text-[12px] mt-2.5 leading-relaxed">
              You're <span className="text-white font-semibold">7%</span> away from Gold. Gold drivers get priority on high-value orders and lower cancellation penalties.
            </div>
          </Card>

          {/* mini leaderboard */}
          <Card className="px-4 py-3">
            <div className="text-white/45 text-[11px] font-semibold uppercase tracking-wide mb-2">Your zone leaderboard</div>
            {[
              { r: '#3,753', n: 'Rider 8841', e: 'HK$402', me: false },
              { r: '#3,754', n: 'Rider 1207', e: 'HK$311', me: false },
              { r: '#3,755', n: 'You', e: 'HK$287', me: true },
              { r: '#3,756', n: 'Rider 4490', e: 'HK$263', me: false },
            ].map((row, i) => (
              <div key={i} className={"flex items-center justify-between py-2 px-2.5 rounded-xl " + (row.me ? "bg-brand/10 border border-brand/25" : "")}>
                <div className="flex items-center gap-3">
                  <span className={"text-[13px] font-bold tabular-nums " + (row.me ? "text-brand" : "text-white/40")}>{row.r}</span>
                  <span className={"text-[14px] font-semibold " + (row.me ? "text-white" : "text-white/60")}>{row.n}</span>
                </div>
                <span className={"text-[13px] font-bold " + (row.me ? "text-brand" : "text-white/45")}>{row.e}</span>
              </div>
            ))}
          </Card>
          <div className="text-center text-white/25 text-[11px] pt-1 pb-2">Rankings update hourly · Fictional demo data</div>
        </div>
      );
    }

    /* ================= APP SHELL ================= */
    function App() {
      const [tab, setTab] = useState('dashboard');
      const [toast, setToast] = useState(null);
      const pushToast = (msg) => {
        setToast(msg);
        setTimeout(() => setToast((t) => (t === msg ? null : t)), 2600);
      };

      const NavBtn = ({ id, label, Ico }) => {
        const active = tab === id;
        return (
          <button onClick={() => setTab(id)} className="flex-1 flex flex-col items-center gap-1 py-1 active:scale-95 transition-transform">
            <Ico className={"w-6 h-6 " + (active ? "text-brand" : "text-white/35")} stroke={active ? 2.4 : 2} />
            <span className={"text-[11px] font-semibold " + (active ? "text-brand" : "text-white/35")}>{label}</span>
          </button>
        );
      };

      return (
        <div className="min-h-screen w-full flex items-center justify-center p-4 sm:p-8" style={{background:'radial-gradient(circle at 50% 0%, #0c1410 0%, #050706 60%)'}}>
          <div className="relative w-full max-w-[400px]">
            {/* phone frame */}
            <div className="relative rounded-[2.6rem] bg-black p-2.5 phone-shadow border border-white/[0.06]">
              <div className="relative rounded-[2.1rem] overflow-hidden bg-ink" style={{height:'min(840px, 88vh)'}}>
                {/* notch */}
                <div className="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-6 bg-black rounded-b-2xl z-30"></div>

                <StatusBar />

                {/* sticky header */}
                <div className="px-4 pt-1.5 pb-3 flex items-center justify-between bg-ink/95 backdrop-blur z-20 relative border-b border-white/[0.05]">
                  <Logo />
                  <OnlinePill />
                </div>

                {/* scroll area */}
                <div className="overflow-y-auto no-scrollbar pt-3.5" style={{height:'calc(100% - 152px)'}}>
                  {tab === 'dashboard' ? <Dashboard pushToast={pushToast} /> : <Rankings />}
                </div>

                {/* toast */}
                {toast && (
                  <div className="absolute bottom-[88px] left-1/2 -translate-x-1/2 z-40 animate-toastIn w-max max-w-[88%]">
                    <div className="bg-white text-ink font-bold text-[13px] px-4 py-2.5 rounded-full shadow-2xl flex items-center gap-2">
                      <CheckCircle className="w-4 h-4 text-brandDim" /> {toast}
                    </div>
                  </div>
                )}

                {/* bottom nav */}
                <div className="absolute bottom-0 left-0 right-0 bg-ink/95 backdrop-blur border-t border-white/[0.07] px-6 pt-2.5 pb-5 flex z-30">
                  <NavBtn id="dashboard" label="Dashboard" Ico={HomeIcon} />
                  <NavBtn id="rankings" label="Rankings" Ico={TrophyIcon} />
                </div>
                {/* home indicator */}
                <div className="absolute bottom-1.5 left-1/2 -translate-x-1/2 w-28 h-1 bg-white/25 rounded-full z-40"></div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
